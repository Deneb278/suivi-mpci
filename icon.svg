    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="cl"><rect width="512" height="512" rx="114"/></clipPath>
</defs>

<rect width="512" height="512" rx="114" fill="#050709"/>

<g clip-path="url(#cl)" font-family="Georgia,'Times New Roman',serif" fill="white" font-style="italic">

